name: tests

# Runs the headless test suite on Linux (a byte-sensitive filesystem). This both
# exercises the educational pages and enforces NFC-normalized paths/content
# (tests/no-nfd.test.mjs) — NFD names that "work" on macOS break here.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # Actions pinned to immutable commit SHAs (not the mutable @v4 tag) to
      # prevent tag-retargeting attacks; persist-credentials off — the suite
      # only needs the checked-out files, not a usable git token.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: lts/*
      - name: Run test suite
        run: |
          set -e
          for f in tests/*.test.mjs; do
            echo "=== $f ==="
            node "$f"
          done
